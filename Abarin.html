<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abarin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet" />
    
    <script type="importmap">
    {
      "imports": {
        "@codemirror/state": "https://esm.sh/@codemirror/state@6",
        "@codemirror/view": "https://esm.sh/@codemirror/view@6",
        "@codemirror/commands": "https://esm.sh/@codemirror/commands@6",
        "@codemirror/language": "https://esm.sh/@codemirror/language@6",
        "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6",
        "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6",
        "@codemirror/lang-cpp": "https://esm.sh/@codemirror/lang-cpp@6",
        "@codemirror/lang-java": "https://esm.sh/@codemirror/lang-java@6",
        "@codemirror/lang-rust": "https://esm.sh/@codemirror/lang-rust@6",
        "@lezer/highlight": "https://esm.sh/@lezer/highlight"
      }
    }
    </script>
    <style>
/* Consolidated style.css */
:root {
    --bg-color: #0a0a0a;
    --bg-panel: #141414;
    --text-primary: #e0e0e0;
    --text-dim: #555555;
    --accent-glow: #00ffca;
    --accent-glow-dim: rgba(0, 255, 202, 0.2);
    --error-color: #ff5555;
    --font-mono: 'JetBrains Mono', monospace;
}

body.theme-blue {
    --accent-glow: #00bfff;
    --accent-glow-dim: rgba(0, 191, 255, 0.2);
}

body.theme-amber {
    --accent-glow: #ffb000;
    --accent-glow-dim: rgba(255, 176, 0, 0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: var(--font-mono);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#boot-screen {
    position: absolute;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background-color: var(--bg-color);
    display: flex; justify-content: center; align-items: center;
    z-index: 100; transition: opacity 1s ease-out, visibility 1s;
}
#boot-screen.hidden { opacity: 0; visibility: hidden; }

.boot-content { text-align: center; }

.glow-text {
    font-size: 3rem; font-weight: 700;
    text-shadow: 0 0 10px var(--accent-glow-dim), 0 0 20px var(--accent-glow-dim);
    margin-bottom: 20px; letter-spacing: 0.2em;
}

.blink {
    color: var(--text-dim);
    animation: blinker 1.5s linear infinite;
}
@keyframes blinker { 50% { opacity: 0; } }

#workspace {
    display: flex; flex-direction: column;
    height: 100%; width: 100%; padding: 15px;
    transition: opacity 1s ease-in;
}
#workspace.hidden { display: none; opacity: 0; }

.header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 15px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.brand {
    font-size: 1.2rem; font-weight: 700;
    color: var(--accent-glow);
    text-shadow: 0 0 5px var(--accent-glow-dim);
    letter-spacing: 0.1em;
}

.toolbar { display: flex; gap: 15px; align-items: center; }

#lang-selector {
    background: var(--bg-panel); color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
    padding: 5px 10px; font-family: var(--font-mono); outline: none; cursor: pointer;
}

.action-buttons { display: flex; gap: 8px; }
.action-buttons button {
    background: var(--bg-panel); color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
    padding: 5px 12px; font-family: var(--font-mono); font-size: 0.85rem;
    cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s;
}
.action-buttons button:hover {
    background: rgba(255,255,255,0.05);
    border-color: var(--accent-glow); color: var(--accent-glow);
}

#btn-run {
    background: rgba(0, 255, 202, 0.1); color: var(--accent-glow);
    border-color: rgba(0, 255, 202, 0.3);
}
#btn-run:hover { background: rgba(0, 255, 202, 0.2); }

.split-pane { display: flex; flex-grow: 1; gap: 15px; overflow: hidden; }
.layout-horizontal .split-pane { flex-direction: column; }
.layout-vertical .split-pane { flex-direction: row; }

#editor-container {
    flex: 1; position: relative;
    border: 1px solid rgba(255,255,255,0.05);
    background: var(--bg-panel); border-radius: 6px;
    overflow: hidden; display: flex; flex-direction: column;
}

.watermark {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 6rem; font-weight: 700; color: rgba(255, 255, 255, 0.02);
    pointer-events: none; z-index: 0; user-select: none;
}

.cm-editor { height: 100%; background-color: transparent !important; z-index: 1; }
.cm-editor.cm-focused { outline: none !important; }
.cm-scroller { font-family: var(--font-mono) !important; font-size: 0.95rem; line-height: 1.6; }
.cm-gutters { background-color: transparent !important; color: var(--text-dim) !important; border-right: none !important; }
.cm-activeLineGutter { color: var(--accent-glow) !important; }
.cm-activeLine { background-color: rgba(255, 255, 255, 0.02) !important; }
.cm-cursor { border-left-color: var(--accent-glow) !important; box-shadow: 0 0 5px var(--accent-glow); }

#terminal-container {
    flex: 1; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 6px; display: flex; flex-direction: column; padding: 10px;
}
.layout-horizontal #terminal-container { flex: 0 0 35%; }

.terminal-header {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text-dim); font-size: 0.85rem; padding-bottom: 5px;
    margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.terminal-header button { background: none; border: none; color: var(--text-dim); cursor: pointer; }
.terminal-header button:hover { color: var(--text-primary); }

#terminal-output {
    flex-grow: 1; overflow-y: auto; color: var(--text-dim);
    font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap;
}
#terminal-output .error { color: var(--error-color); }
#terminal-output .output { color: var(--text-primary); }
#terminal-output .sys-msg { color: var(--accent-glow); opacity: 0.7; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

.command-line {
    display: flex; align-items: center; padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.prompt { color: var(--accent-glow); margin-right: 10px; font-weight: 700; }
#command-input {
    flex-grow: 1; background: transparent; border: none;
    color: var(--text-primary); font-family: var(--font-mono); font-size: 0.9rem; outline: none;
}
#command-input::placeholder { color: var(--text-dim); }

.footer {
    display: flex; justify-content: flex-end; padding-top: 10px;
    font-size: 0.8rem; color: var(--text-dim);
}
    </style>
</head>
<body>
    <div id="boot-screen" class="active">
        <div class="boot-content">
            <h1 class="glow-text">Abarin</h1>
            <p class="blink">Press any key to begin...</p>
        </div>
    </div>

    <!-- The workspace manages layout direction -->
    <div id="workspace" class="hidden layout-horizontal">
        <div class="header">
            <div class="brand">Abarin</div>
            <div class="toolbar">
                <select id="lang-selector">
                    <option value="python" data-version="3.10.0">Python 3</option>
                    <option value="javascript" data-version="18.15.0">JavaScript (Node)</option>
                    <option value="cpp" data-version="10.2.0">C++ (GCC)</option>
                    <option value="java" data-version="15.0.2">Java</option>
                    <option value="rust" data-version="1.68.2">Rust</option>
                </select>
                <div class="action-buttons">
                    <button id="btn-run" title="Run Code"><span class="material-symbols-outlined">play_arrow</span> Run</button>
                    <button id="btn-copy" title="Copy to Clipboard"><span class="material-symbols-outlined">content_copy</span> Copy</button>
                    <button id="btn-save" title="Save File"><span class="material-symbols-outlined">save</span> Save</button>
                    <button id="btn-layout" title="Toggle Layout"><span class="material-symbols-outlined">splitscreen</span> Layout</button>
                </div>
            </div>
        </div>
        
        <div class="split-pane">
            <div id="editor-container">
                <div class="watermark">Abarin</div>
            </div>
            
            <div id="terminal-container">
                <div class="terminal-header">
                    <span>Terminal</span>
                    <button id="btn-clear-term" title="Clear Output"><span class="material-symbols-outlined">backspace</span></button>
                </div>
                <div id="terminal-output">
                    <span class="sys-msg">Initializing Abarin session... connecting to execution engine...</span>
                </div>
                <div class="command-line">
                    <span class="prompt">~ abarin </span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false" placeholder="Type a command (:run, :save, :clear, :layout) or hit enter">
                </div>
            </div>
        </div>

        <div class="footer">
            <span class="status-msg">Session is temporary. Executing securely via Piston API.</span>
        </div>
    </div>

    <!-- Inline Application Script -->
    <script type="module">
        import { EditorState } from "@codemirror/state";
        import { EditorView, keymap, lineNumbers, highlightActiveLineGutter, highlightActiveLine } from "@codemirror/view";
        import { defaultKeymap, history, historyKeymap } from "@codemirror/commands";
        import { syntaxHighlighting, HighlightStyle } from "@codemirror/language";
        import { tags } from "@lezer/highlight";

        import { python } from "@codemirror/lang-python";
        import { javascript } from "@codemirror/lang-javascript";
        import { cpp } from "@codemirror/lang-cpp";
        import { java } from "@codemirror/lang-java";
        import { rust } from "@codemirror/lang-rust";

        const abarinHighlightStyle = HighlightStyle.define([
            { tag: tags.keyword, color: "#ff7b72" },
            { tag: tags.controlKeyword, color: "#ff7b72" },
            { tag: tags.operator, color: "#79c0ff" },
            { tag: tags.punctuation, color: "#c9d1d9" },
            { tag: tags.string, color: "#a5d6ff" },
            { tag: tags.number, color: "#79c0ff" },
            { tag: tags.bool, color: "#79c0ff" },
            { tag: tags.className, color: "#d2a8ff" },
            { tag: tags.function(tags.variableName), color: "#d2a8ff" },
            { tag: tags.variableName, color: "#c9d1d9" },
            { tag: tags.comment, color: "#8b949e", fontStyle: "italic" },
        ]);

        const LANGUAGE_MODES = {
            "python": python,
            "javascript": javascript,
            "cpp": cpp,
            "java": java,
            "rust": rust
        };

        const DEFAULT_CODES = {
            "python": \`def greet(name="World"):\n    print(f"Hello, {name}!")\n\ngreet("Abarin")\`,
            "javascript": \`function greet(name = "World") {\n    console.log(\\\`Hello, \${name}!\\\`);\n}\n\ngreet("Abarin");\`,
            "cpp": \`#include <iostream>\n\nint main() {\n    std::cout << "Hello, Abarin!" << std::endl;\n    return 0;\n}\`,
            "java": \`public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, Abarin!");\n    }\n}\`,
            "rust": \`fn main() {\n    println!("Hello, Abarin!");\n}\`
        };

        let editor = null;
        let isBooted = false;

        const bootScreen = document.getElementById("boot-screen");
        const workspace = document.getElementById("workspace");
        const terminalOutput = document.getElementById("terminal-output");
        const commandInput = document.getElementById("command-input");
        const langSelector = document.getElementById("lang-selector");

        function initEditor() {
            let state = EditorState.create({
                doc: DEFAULT_CODES["python"],
                extensions: [
                    lineNumbers(),
                    highlightActiveLineGutter(),
                    history(),
                    python(),
                    syntaxHighlighting(abarinHighlightStyle),
                    highlightActiveLine(),
                    keymap.of([...defaultKeymap, ...historyKeymap]),
                    EditorView.theme({
                        "&": { color: "var(--text-primary)", backgroundColor: "transparent" }
                    }, {dark: true})
                ]
            });

            editor = new EditorView({
                state,
                parent: document.getElementById("editor-container")
            });
        }

        function updateEditorLanguage(langName) {
            if (!editor) return;
            
            let code = DEFAULT_CODES[langName] || "";
            let langExt = LANGUAGE_MODES[langName] ? LANGUAGE_MODES[langName]() : python();

            let newState = EditorState.create({
                doc: code,
                extensions: [
                    lineNumbers(),
                    highlightActiveLineGutter(),
                    history(),
                    langExt,
                    syntaxHighlighting(abarinHighlightStyle),
                    highlightActiveLine(),
                    keymap.of([...defaultKeymap, ...historyKeymap]),
                    EditorView.theme({
                        "&": { color: "var(--text-primary)", backgroundColor: "transparent" }
                    }, {dark: true})
                ]
            });
            
            editor.setState(newState);
        }

        function termPrint(text, className = "output") {
            const span = document.createElement("span");
            span.className = className;
            span.innerText = text + "\\n";
            terminalOutput.appendChild(span);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        async function executeCode() {
            const lang = langSelector.value;
            const version = langSelector.options[langSelector.selectedIndex].dataset.version;
            const code = editor.state.doc.toString();
            
            termPrint(\`\\n--- Executing \${lang} ---\`, "sys-msg");

            try {
                const response = await fetch("https://emacs.piston.rs/api/v2/execute", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        language: lang,
                        version: version,
                        files: [{ content: code }]
                    })
                });
                
                const data = await response.json();
                
                if (data.run && data.run.stdout) termPrint(data.run.stdout, "output");
                if (data.run && data.run.stderr) termPrint(data.run.stderr, "error");
                if (data.compile && data.compile.stderr) termPrint(data.compile.stderr, "error");
                
            } catch (err) {
                termPrint(\`Execution failed: \${err.message}\`, "error");
            }
        }

        function copyCode() {
            const code = editor.state.doc.toString();
            navigator.clipboard.writeText(code);
            termPrint("Code copied to clipboard.", "sys-msg");
        }

        function saveCode() {
            const code = editor.state.doc.toString();
            const extRaw = langSelector.value;
            const ext = { "python": "py", "javascript": "js", "cpp": "cpp", "java": "java", "rust": "rs" }[extRaw] || "txt";
            
            const blob = new Blob([code], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = \`abarin_source.\${ext}\`;
            a.click();
            URL.revokeObjectURL(url);
            termPrint(\`Saved as abarin_source.\${ext}\`, "sys-msg");
        }

        function toggleLayout() {
            const isHor = workspace.classList.contains("layout-horizontal");
            if (isHor) {
                workspace.classList.remove("layout-horizontal");
                workspace.classList.add("layout-vertical");
                termPrint("Layout: Vertical", "sys-msg");
            } else {
                workspace.classList.remove("layout-vertical");
                workspace.classList.add("layout-horizontal");
                termPrint("Layout: Horizontal", "sys-msg");
            }
        }

        function handleCommand(cmd) {
            const rawArgs = cmd.trim().split(" ");
            const action = rawArgs[0].toLowerCase();
            
            termPrint(\`> \${cmd}\`, "sys-msg");
            
            switch (action) {
                case ":run": executeCode(); break;
                case ":clear": 
                    terminalOutput.innerHTML = "";
                    termPrint("Terminal cleared.", "sys-msg");
                    break;
                case ":save": saveCode(); break;
                case ":layout": toggleLayout(); break;
                case ":theme":
                    const themes = ["", "theme-blue", "theme-amber"];
                    const current = document.body.className;
                    let nextIndex = (themes.indexOf(current) + 1) % themes.length;
                    document.body.className = themes[nextIndex];
                    termPrint(\`Theme toggled.\`, "sys-msg");
                    break;
                default:
                    if (cmd.trim() !== "") termPrint(\`Unknown command: \${action}\`, "error");
                    editor.focus();
                    break;
            }
        }

        document.addEventListener("keydown", (e) => {
            if (!isBooted) {
                isBooted = true;
                bootScreen.classList.add("hidden");
                workspace.classList.remove("hidden");
                initEditor();
                termPrint("Terminal ready. Execute code using Piston API.", "sys-msg");
                setTimeout(() => editor.focus(), 100);
                return;
            }
        });

        commandInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                const cmd = commandInput.value;
                commandInput.value = "";
                handleCommand(cmd);
            }
        });

        document.getElementById("btn-run").addEventListener("click", executeCode);
        document.getElementById("btn-copy").addEventListener("click", copyCode);
        document.getElementById("btn-save").addEventListener("click", saveCode);
        document.getElementById("btn-layout").addEventListener("click", toggleLayout);
        document.getElementById("btn-clear-term").addEventListener("click", () => {
            terminalOutput.innerHTML = "";
            termPrint("Terminal cleared.", "sys-msg");
        });

        langSelector.addEventListener("change", (e) => {
            updateEditorLanguage(e.target.value);
            termPrint(\`Switched to \${e.target.value}\`, "sys-msg");
        });
    </script>
</body>
</html>
